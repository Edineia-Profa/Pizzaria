<!DOCTYPE html> 
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"> 
<head> 
    <meta charset="UTF-8"> 
    <title th:text="${titulo} + ' | Pizzaria ITB'"></title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet"> 
</head> 
<body> 
<nav th:replace="~{layout :: navbar}"></nav> 
<div class="container mt-5"> 
    <h2 class="mb-4">Nosso Cardápio 🍕</h2> 
    <div class="row g-4"> 
        <div class="col-md-4"> 
            <div class="card border-danger"> 
                <div class="card-body"> 
                    <h5 class="card-title">🍅 Margherita</h5> 
                    <p class="card-text text-muted"> 
                        Molho de tomate, mussarela e manjericão fresco 
                    </p> 
                    <span class="badge bg-danger">R$ 32,90</span> 
                </div> 
            </div> 
        </div> 
        <div class="col-md-4"> 
            <div class="card border-danger"> 
                <div class="card-body"> 
                    <h5 class="card-title">🥩 Calabresa c</h5> 
                    <p class="card-text text-muted"> 
                        Molho, mussarela, calabresa fatiada e cebola 
                    </p> 
                    <span class="badge bg-danger">R$ 38,90</span> 
                </div> 
            </div> 
        </div> 
        <div class="col-md-4"> 
            <div class="card border-danger"> 
                <div class="card-body"> 
                    <h5 class="card-title">🍍 Frango c/ Catupiry</h5> 
                    <p class="card-text text-muted"> 
                        Frango desfiado com catupiry cremoso 
                    </p> 
                    <span class="badge bg-danger">R$ 42,90</span> 
                </div> 
            </div> 
        </div> 
</body> 
</html>
