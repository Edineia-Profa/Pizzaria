
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo} + ' | Pizzaria ITB'">Contato | Pizzaria ITB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            background-color: #fafaf8;
        }
 
        h1.page-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -0.01em;
        }
 
        .page-subtitle {
            font-size: 0.9rem;
            color: #888;
        }
 
        .form-card {
            background: #fff;
            border: 1px solid #e8e4de;
            border-radius: 12px;
            padding: 2rem;
        }
 
        .form-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #444;
        }
 
        .form-control {
            border-radius: 8px;
            border-color: #ddd;
            font-size: 0.95rem;
        }
 
        .form-control:focus {
            border-color: #c0392b;
            box-shadow: 0 0 0 0.2rem rgba(192, 57, 43, 0.15);
        }
 
        .btn-salvar {
            background-color: #c0392b;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 2rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            transition: background-color 0.2s ease;
        }
 
        .btn-salvar:hover {
            background-color: #a93226;
            color: #fff;
        }
 
        .btn-cancelar {
            border-radius: 8px;
            padding: 0.6rem 2rem;
            font-size: 0.95rem;
            color: #666;
            border-color: #ccc;
        }
 
        .btn-cancelar:hover {
            background-color: #f0ece6;
            border-color: #bbb;
            color: #333;
        }
    </style>
</head>
<body>
 
<nav th:replace="~{layout :: navbar}"></nav>
 
<div class="container mt-5">
 
    <div class="mb-4">
        <h1 class="page-title">Contato</h1>
        <p class="page-subtitle">Preencha os dados abaixo para entrar em contato</p>
    </div>
 
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="form-card">
                <form>
 
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="nome"
                               placeholder="Digite seu nome completo">
                    </div>
 
                    <div class="mb-3">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="tel" class="form-control" id="telefone"
                               placeholder="(00) 00000-0000">
                    </div>
 
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email"
                               placeholder="seuemail@exemplo.com">
                    </div>
 
                    <div class="mb-4">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea class="form-control" id="descricao" rows="4"
                                  placeholder="Descreva sua mensagem..."></textarea>
                    </div>
 
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="/" class="btn btn-outline-secondary btn-cancelar">Cancelar</a>
                        <button type="submit" class="btn btn-salvar">Enviar</button>
                    </div>
 
                </form>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{layout :: footer}"></footer>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
