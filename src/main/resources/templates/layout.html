<!DOCTYPE html>
 
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo} + ' | Pizzaria ITB'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"  
          rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<!-- FRAGMENTO: Navbar reutilizável -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="navbar">
    <div class="container">
       
        <a class="navbar-brand text-danger fw-bold" th:href="@{/home}">
            🍕 Pizzaria ITB
        </a>
        <button class="navbar-toggler" type="button"  
                data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
           <p> Página Sobre Nós</p>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}"  
                       th:classappend="${paginaAtual == 'home'} ? 'active'">
                        Início
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cardapio}"
                       th:classappend="${paginaAtual == 'cardapio'} ? 'active'">
                        Cardápio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/sobre}"
                       th:classappend="${paginaAtual == 'sobre'} ? 'active'">
                        Sobre
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
 
<!-- FRAGMENTO: Rodapé reutilizável -->
<footer class="bg-dark text-white text-center py-3 mt-5" th:fragment="footer">
    <p class="mb-0">© 2025 Pizzaria ITB — Spring Boot com Thymeleaf</p>
</footer>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
